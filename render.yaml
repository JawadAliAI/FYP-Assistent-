services:
  - type: web
    name: fitbot-api
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg portaudio19-dev
      pip install -r requirements.txt
    startCommand: sh start.sh
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: 10000
    healthCheckPath: /health
